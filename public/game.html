<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>iSword — Arena</title>
  <link rel="icon" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    #app { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 20; }
    .overlay.hidden { display: none; }

    #pairCard { width: min(560px, 94vw); text-align: center; }
    .pairgrid { display: flex; gap: 26px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .pairgrid .left { text-align: left; }
    .step { color: var(--muted); font-size: 14px; line-height: 1.7; margin: 10px 0; }
    .step b { color: var(--fg); }

    /* HUD */
    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; font-variant-numeric: tabular-nums; }
    #hud .tl { position: absolute; top: 18px; left: 20px; }
    #hud .tr { position: absolute; top: 18px; right: 20px; text-align: right; }
    #hud .bc { position: absolute; bottom: 22px; left: 0; right: 0; text-align: center; }
    .stat { font-size: 15px; color: var(--muted); }
    .stat .n { font-size: 30px; font-weight: 800; color: var(--fg); }
    .combo { color: var(--gold); font-weight: 800; font-size: 22px; min-height: 26px; text-shadow: 0 0 16px rgba(255,209,102,.5); }
    .power-wrap { width: 190px; height: 12px; border-radius: 8px; background: rgba(0,0,0,.35); border: 1px solid var(--border); overflow: hidden; margin-left: auto; margin-top: 6px; }
    .power-wrap > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg,#4ade80,#ffd166,#ff5c7a); transition: width .08s linear; }
    .hint-pill { display: inline-block; padding: 8px 16px; border-radius: 999px; background: rgba(0,0,0,.4); border: 1px solid var(--border); color: var(--muted); font-size: 13.5px; }
    .flash { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(255,255,255,.0), rgba(255,255,255,0)); pointer-events: none; z-index: 9; }

    .conn { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 15; }
    .miniqr { background:#fff; padding:8px; border-radius:10px; line-height:0; }
    .miniqr canvas { width:132px; height:132px; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three.module.js",
      "three/addons/": "./vendor/three/addons/"
    }
  }
  </script>
  <script src="vendor/qrcode.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <div class="flash" id="flash"></div>

  <!-- HUD -->
  <div id="hud" style="display:none">
    <div class="tl">
      <div class="stat"><span class="n" id="hitsN">0</span> hits</div>
      <div class="stat" style="margin-top:6px">best combo <b id="bestCombo" style="color:var(--gold)">0</b></div>
    </div>
    <div class="tr">
      <div class="stat">swing <span class="n" id="speedN">0.0</span> <span style="font-size:13px">m/s</span></div>
      <div class="power-wrap"><i id="powerFill"></i></div>
    </div>
    <div class="bc">
      <div class="combo" id="comboText"></div>
      <div style="height:8px"></div>
      <span class="hint-pill" id="hintPill">Tap <b>Calibrate</b> on your phone, then swing</span>
    </div>
  </div>

  <!-- Pairing / start overlay -->
  <div class="overlay" id="overlay">
    <div class="card" id="pairCard">
      <h1 class="brand" style="font-size:clamp(30px,7vw,60px);margin-bottom:6px">i<span class="blade">Sword</span></h1>
      <p class="tag" style="margin:0 auto 18px">Training Arena · fight the dummy</p>
      <div class="pairgrid">
        <div class="miniqr" id="qrBox"><div id="qr"></div></div>
        <div class="left">
          <div class="step">1 · On your phone open<br/><b id="joinUrl">this site</b></div>
          <div class="step">2 · Enter room code<br/><span class="code" id="roomCode">····</span></div>
          <div class="step">3 · Hold phone as a grip, tap <b>Calibrate</b>, swing!</div>
        </div>
      </div>
      <div class="row" style="margin-top:18px">
        <span class="pill"><span class="dot" id="pairDot"></span> <span id="pairStatus">waiting for phone…</span></span>
      </div>
      <div style="height:16px"></div>
      <button class="btn" id="startBtn">Enter Arena</button>
      <div style="height:10px"></div>
      <button class="btn secondary" id="mouseBtn">Try with mouse / keyboard</button>
      <p class="muted" style="margin-top:12px" id="localHint"></p>
    </div>
  </div>

  <script type="module" src="js/game.js"></script>
</body>
</html>
