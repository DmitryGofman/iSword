<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>iSword RUN — Neon Runway</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#07070f;touch-action:none;
    font-family:system-ui,-apple-system,sans-serif;-webkit-user-select:none;user-select:none}
  canvas{display:block;width:100vw;height:100vh}
  #hud{position:fixed;top:0;left:0;right:0;padding:12px 16px;display:flex;
    justify-content:space-between;align-items:flex-start;pointer-events:none;color:#e8f6ff}
  .big{font-size:30px;font-weight:800;text-shadow:0 0 16px #37e6ff}
  #coins{color:#ffd23c;text-shadow:0 0 12px #ffb300;font-size:18px;font-weight:800}
  #combo{color:#ff7ae6;font-weight:700;font-size:15px;min-height:18px;text-shadow:0 0 10px #ff7ae6}
  #hearts{font-size:18px;letter-spacing:2px}
  #hint{position:fixed;bottom:12px;left:0;right:0;text-align:center;color:#7f8db0;font-size:12.5px;pointer-events:none}
  b{color:#37e6ff}
  #over{position:fixed;inset:0;display:none;place-items:center;background:rgba(5,5,15,.86);color:#e8f6ff;text-align:center}
  #over h1{margin:0 0 4px;font-size:30px;text-shadow:0 0 20px #37e6ff}
  #over .stats{color:#9fb0d0;font-size:15px;line-height:1.7;margin-bottom:14px}
  .shop{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
  .shop button{background:#141430;color:#e8f6ff;border:1px solid #37e6ff55;border-radius:12px;
    padding:10px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
  .shop button:disabled{opacity:.42}
  #again{background:#37e6ff;color:#06131a;border:0;border-radius:14px;padding:13px 34px;
    font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 0 24px #37e6ff66}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div><div class="big" id="dist">0m</div><div id="combo"></div></div>
  <div style="text-align:center"><div id="coins">🪙 0</div><div id="hearts"></div></div>
  <div style="text-align:right;color:#7f8db0;font-size:12.5px">RUN A<br><b>NEON RUNWAY</b></div>
</div>
<div id="hint"><b>Slice the green blobs</b> for score &amp; coins · <b style="color:#ff5c7a">cut the red gates</b> before they hit you · never touch the <b style="color:#c07aff">violet mines</b></div>
<div id="over"><div>
  <h1>RUN OVER</h1>
  <div class="stats" id="stats"></div>
  <div class="shop" id="shop"></div>
  <button id="again">RUN AGAIN</button>
</div></div>
<script>
'use strict';
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W=0,H=0,CX=0,HORIZON=0,DPR=Math.min(2,window.devicePixelRatio||1);
function resize(){W=innerWidth;H=innerHeight;CX=W/2;HORIZON=H*0.38;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();

let AC=null;
function audio(){if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();return AC;}
function blip(f,dur,type,vol){try{
  const ac=audio(),o=ac.createOscillator(),g=ac.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(f,ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(40,f*0.55),ac.currentTime+dur);
  g.gain.setValueAtTime(vol||0.15,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+dur);
}catch(e){}}

// ---------- persistent wallet + upgrades ----------
const SAVE_KEY='iswordRunNeon';
let save={wallet:0,up:{heart:0,blade:0,gold:0}};
try{const s=JSON.parse(localStorage.getItem(SAVE_KEY));if(s&&s.up)save=s;}catch(e){}
function persist(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(save));}catch(e){}}
const SHOP=[
  {id:'heart',name:'❤️ Extra Heart',desc:'+1 heart each run',cost:l=>250*(l+1),max:2},
  {id:'blade',name:'🗡️ Wide Blade', desc:'bigger slice reach', cost:l=>150*(l+1),max:3},
  {id:'gold', name:'💰 Golden Edge',desc:'+50% coins/blob',   cost:l=>200*(l+1),max:3},
];

// ---------- world ----------
// Entities live at depth z (1 = horizon, 0 = the blade plane) in lanes -1/0/1.
const FOC=230, DEPTH=1500, NEAR=0.2;
function proj(lane,z,alt){
  const s=FOC/(FOC+z*DEPTH), conv=0.5+0.5*z;
  return {x:CX+lane*(W*0.31)*s*conv/ (FOC/(FOC+0*DEPTH)) , y:HORIZON+(H-HORIZON)*s*0.98-(alt||0)*s*3.2, s};
}
let ents,parts,pops,trail,coinsFly;
let dist,run,combo,comboT,hearts,coinsRun,kills,speedZ,spawnT,gridZ,shake,flash,dead;
function reset(){
  ents=[];parts=[];pops=[];trail=[];coinsFly=[];
  dist=0;combo=0;comboT=0;coinsRun=0;kills=0;
  hearts=3+save.up.heart;speedZ=0.42;spawnT=0.8;gridZ=0;shake=0;flash=0;dead=false;
  overEl.style.display='none';
}
const distEl=document.getElementById('dist'),coinsEl=document.getElementById('coins'),
      comboEl=document.getElementById('combo'),heartsEl=document.getElementById('hearts'),
      overEl=document.getElementById('over'),statsEl=document.getElementById('stats'),
      shopEl=document.getElementById('shop');

function spawn(){
  const r=Math.random();
  if(r<0.62){ // blob (sometimes a small squad)
    const n=1+(Math.random()*2|0);
    const used=[];
    for(let i=0;i<n;i++){
      let lane;do{lane=(Math.random()*3|0)-1;}while(used.includes(lane));used.push(lane);
      ents.push({kind:'blob',lane,z:1+i*0.06,alt:8+Math.random()*26,bob:Math.random()*7,r:30+Math.random()*12});
    }
  }else if(r<0.79){ // red gate: spans all lanes, MUST be cut
    ents.push({kind:'gate',lane:0,z:1,alt:16,r:0,warned:false});
  }else if(r<0.9){ // mine: never touch
    ents.push({kind:'mine',lane:(Math.random()*3|0)-1,z:1,alt:14+Math.random()*20,bob:Math.random()*7,r:22});
  }else{ // free coin trio drifting down a lane
    const lane=(Math.random()*3|0)-1;
    for(let i=0;i<3;i++)ents.push({kind:'coin',lane,z:1+i*0.08,alt:16,bob:i*2,r:14});
  }
}

// ---------- input ----------
let down=false;
function pt(e){return{x:e.clientX,y:e.clientY,t:performance.now()};}
addEventListener('pointerdown',e=>{audio();
  if(dead){return;} down=true;trail.length=0;trail.push(pt(e));});
addEventListener('pointerup',()=>{down=false;});
addEventListener('pointermove',e=>{
  if(!down||dead)return;
  const p=pt(e),q=trail[trail.length-1];trail.push(p);
  if(!q)return;
  const dt=Math.max(1,p.t-q.t),dx=p.x-q.x,dy=p.y-q.y;
  if(Math.hypot(dx,dy)/dt*1000<320)return;
  const reach=8+save.up.blade*7;
  for(let i=ents.length-1;i>=0;i--){
    const o=ents[i];if(o.z>NEAR)continue;
    const pr=proj(o.lane,Math.max(0.02,o.z),o.alt+(o.bob?Math.sin(perfNow*0.004+o.bob)*10:0));
    const rr=o.kind==='gate'?W*0.34:pr.s*o.r;
    if(segCircle(q.x,q.y,p.x,p.y,pr.x,pr.y,rr+reach)){
      if(o.kind==='blob'){ents.splice(i,1);cutBlob(o,pr,dx,dy);}
      else if(o.kind==='gate'){ents.splice(i,1);cutGate(pr,dx,dy);}
      else if(o.kind==='mine'){ents.splice(i,1);hitMine(pr);}
      else if(o.kind==='coin'){ents.splice(i,1);grabCoin(pr,1);}
    }
  }
});
function segCircle(x1,y1,x2,y2,cx,cy,r){
  const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;
  let t=l2?((cx-x1)*dx+(cy-y1)*dy)/l2:0;t=Math.max(0,Math.min(1,t));
  const px=x1+t*dx,py=y1+t*dy;
  return (px-cx)*(px-cx)+(py-cy)*(py-cy)<=r*r;
}
function cutBlob(o,pr,dx,dy){
  combo++;comboT=1.6;kills++;
  const pts=10*combo;dist+=0; // score is distance+kills; blobs pay coins
  const pay=Math.round((1+Math.random()*2)*(1+save.up.gold*0.5));
  grabCoin(pr,pay);
  shake=6;blip(430+combo*40,0.13,'triangle',0.17);
  pops.push({x:pr.x,y:pr.y,txt:'+'+pts,col:'#7dff8a',life:1});
  const ang=Math.atan2(dy,dx);
  for(let i=0;i<14;i++){const a=ang+(Math.random()-0.5)*2,v=140+Math.random()*380;
    parts.push({x:pr.x,y:pr.y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,col:'#4dff6a',life:0.35+Math.random()*0.4});}
}
function cutGate(pr,dx,dy){
  combo++;comboT=1.6;shake=10;blip(240,0.2,'square',0.2);blip(720,0.25,'triangle',0.12);
  pops.push({x:CX,y:pr.y,txt:'GATE DOWN',col:'#ff5c7a',life:1.1});
  for(let i=0;i<26;i++){const a=Math.random()*7,v=160+Math.random()*420;
    parts.push({x:CX+(Math.random()-0.5)*W*0.5,y:pr.y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,col:'#ff5c7a',life:0.4+Math.random()*0.4});}
}
function hitMine(pr){
  loseHeart('MINE!');
  for(let i=0;i<22;i++){const a=Math.random()*7,v=160+Math.random()*380;
    parts.push({x:pr.x,y:pr.y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,col:'#c07aff',life:0.4+Math.random()*0.4});}
}
function grabCoin(pr,n){
  coinsRun+=n;
  for(let i=0;i<Math.min(n,5);i++)
    coinsFly.push({x:pr.x+(Math.random()-0.5)*30,y:pr.y+(Math.random()-0.5)*30,t:0});
  blip(1050,0.09,'sine',0.1);
}
function loseHeart(why){
  hearts--;combo=0;shake=20;flash=1;blip(95,0.4,'sawtooth',0.28);
  pops.push({x:CX,y:H*0.55,txt:why,col:'#ff5c7a',life:1.2});
  if(hearts<=0)die();
}
function die(){
  dead=true;save.wallet+=coinsRun;persist();
  statsEl.innerHTML=`distance <b style="color:#37e6ff">${Math.round(dist)}m</b> · blobs cut <b>${kills}</b><br>`+
    `coins this run <b style="color:#ffd23c">🪙 ${coinsRun}</b> · wallet <b style="color:#ffd23c">🪙 ${save.wallet}</b>`;
  renderShop();overEl.style.display='grid';
}
function renderShop(){
  shopEl.innerHTML='';
  for(const it of SHOP){
    const lv=save.up[it.id],b=document.createElement('button');
    if(lv>=it.max){b.textContent=`${it.name} MAX`;b.disabled=true;}
    else{const c=it.cost(lv);b.innerHTML=`${it.name} lv${lv} → ${lv+1}<br><span style="color:#ffd23c">🪙 ${c}</span> · <span style="color:#9fb0d0">${it.desc}</span>`;
      b.disabled=save.wallet<c;
      b.onclick=()=>{save.wallet-=c;save.up[it.id]++;persist();die();};}
    shopEl.appendChild(b);
  }
}
document.getElementById('again').onclick=()=>reset();

// ---------- render ----------
function bg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0a1e');g.addColorStop(0.38,'#170f33');g.addColorStop(1,'#090914');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // sun
  ctx.save();ctx.shadowColor='#ff7ae6';ctx.shadowBlur=50;
  const sg=ctx.createLinearGradient(0,HORIZON-90,0,HORIZON);
  sg.addColorStop(0,'#ffd23c');sg.addColorStop(1,'#ff4fa0');
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(CX,HORIZON,70,Math.PI,0);ctx.fill();ctx.restore();
  // stars
  ctx.fillStyle='rgba(255,255,255,.5)';
  for(let i=0;i<40;i++){const x=(i*211.7)%W,y=(i*97.3)%(HORIZON*0.9);
    ctx.globalAlpha=0.2+((i*13)%10)/22;ctx.fillRect(x,y,2,2);}
  ctx.globalAlpha=1;
  // ground: converging lane lines + rushing horizontals
  ctx.strokeStyle='rgba(120,80,255,.5)';ctx.lineWidth=1.5;
  for(let l=-2;l<=2;l++){const lane=l*0.5;
    const a=proj(lane*2,0.995,0),b2=proj(lane*2,0.02,0);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b2.x,b2.y);ctx.stroke();}
  for(let i=0;i<12;i++){
    let z=(i*0.085+ (1-gridZ))%1;if(z<0.02)continue;
    const p=proj(0,z,0);
    ctx.globalAlpha=0.14+0.4*(1-z);
    ctx.beginPath();ctx.moveTo(proj(-2.4,z,0).x,p.y);ctx.lineTo(proj(2.4,z,0).x,p.y);ctx.stroke();
  }
  ctx.globalAlpha=1;
}
function drawEnt(o,t){
  const bobA=o.bob?Math.sin(t*0.004+o.bob)*10:0;
  const p=proj(o.lane,Math.max(0.02,o.z),o.alt+bobA), near=o.z<NEAR;
  if(o.kind==='gate'){
    const hw=W*0.34*(0.5+0.5*(1-o.z));
    ctx.save();ctx.translate(CX,p.y);
    ctx.shadowColor='#ff2050';ctx.shadowBlur=near?30:14;
    ctx.fillStyle=near?'rgba(255,40,80,.75)':'rgba(255,40,80,.4)';
    const gh=12+26*(1-o.z);
    ctx.fillRect(-hw,-gh/2,hw*2,gh);
    ctx.fillStyle='#ffe9f0';ctx.font=`bold ${Math.max(10,18*(1-o.z)+8)}px system-ui`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    if(near)ctx.fillText('CUT!',0,0);
    ctx.restore();return;
  }
  ctx.save();ctx.translate(p.x,p.y);
  const r=p.s*o.r;
  if(o.kind==='blob'){
    ctx.shadowColor='#4dff6a';ctx.shadowBlur=near?26:12;
    const sq=1+Math.sin(t*0.008+o.bob)*0.12;   // gel wobble
    ctx.scale(sq,2-sq);
    const g=ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r);
    g.addColorStop(0,'#c8ffd2');g.addColorStop(0.5,'#4dff6a');g.addColorStop(1,'#0d7a2a');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r,0,7);ctx.fill();
    if(near){ctx.strokeStyle='#c8ffd2';ctx.lineWidth=2;ctx.stroke();}
    ctx.fillStyle='rgba(6,40,14,.85)';                 // little eyes
    ctx.beginPath();ctx.arc(-r*0.28,-r*0.1,r*0.11,0,7);ctx.arc(r*0.28,-r*0.1,r*0.11,0,7);ctx.fill();
  }else if(o.kind==='mine'){
    ctx.shadowColor='#c07aff';ctx.shadowBlur=near?26:12;
    ctx.rotate(t*0.002);
    ctx.fillStyle='#1c0f2e';ctx.strokeStyle='#c07aff';ctx.lineWidth=2.5;
    ctx.beginPath();
    for(let i=0;i<10;i++){const a=i/10*Math.PI*2,rr=i%2?r*0.62:r*1.15;
      ctx[i?'lineTo':'moveTo'](Math.cos(a)*rr,Math.sin(a)*rr);}
    ctx.closePath();ctx.fill();ctx.stroke();
  }else if(o.kind==='coin'){
    ctx.shadowColor='#ffd23c';ctx.shadowBlur=16;
    ctx.fillStyle='#ffd23c';ctx.beginPath();ctx.arc(0,0,r,0,7);ctx.fill();
    ctx.fillStyle='#a86e00';ctx.font=`bold ${r*1.2}px system-ui`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('¢',0,1);
  }
  ctx.restore();
}
function drawTrail(now){
  while(trail.length&&now-trail[0].t>130)trail.shift();
  if(trail.length<2)return;
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
  for(let pass=0;pass<2;pass++){
    ctx.beginPath();ctx.moveTo(trail[0].x,trail[0].y);
    for(let i=1;i<trail.length;i++)ctx.lineTo(trail[i].x,trail[i].y);
    ctx.strokeStyle=pass?'rgba(255,255,255,.95)':'rgba(55,230,255,.5)';
    ctx.lineWidth=pass?3.5:12;ctx.shadowColor='#37e6ff';ctx.shadowBlur=pass?14:26;
    ctx.stroke();}
  ctx.restore();
}

reset();
let last=performance.now(),perfNow=last;
function frame(now){
  requestAnimationFrame(frame);
  perfNow=now;
  const dt=Math.min(0.035,(now-last)/1000);last=now;
  const gdt=dead?0:dt;

  speedZ=Math.min(1.05,speedZ+gdt*0.008);
  dist+=gdt*speedZ*95;
  gridZ=(gridZ+speedZ*gdt)%1;
  spawnT-=gdt*speedZ*1.7;
  if(spawnT<=0&&!dead){spawn();spawnT=0.75+Math.random()*0.55;}
  comboT-=gdt;if(comboT<=0)combo=0;

  for(let i=ents.length-1;i>=0;i--){
    const o=ents[i];o.z-=speedZ*gdt*0.32;
    if(o.z<=-0.02){
      ents.splice(i,1);
      if(o.kind==='gate')loseHeart('GATE HIT!');
      else if(o.kind==='blob'){combo=0;}
    }
  }
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=700*dt;p.life-=dt;if(p.life<=0)parts.splice(i,1);}
  for(let i=pops.length-1;i>=0;i--){const p=pops[i];p.y-=55*dt;p.life-=dt*1.1;if(p.life<=0)pops.splice(i,1);}
  for(let i=coinsFly.length-1;i>=0;i--){const c=coinsFly[i];c.t+=dt*2.2;
    if(c.t>=1)coinsFly.splice(i,1);}
  shake=Math.max(0,shake-70*dt);flash=Math.max(0,flash-2.5*dt);

  ctx.save();
  if(shake>0)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  bg();
  ents.sort((a,b)=>b.z-a.z);
  for(const o of ents)drawEnt(o,now);
  ctx.shadowBlur=0;
  for(const p of parts){ctx.globalAlpha=Math.max(0,p.life*1.8);ctx.fillStyle=p.col;ctx.fillRect(p.x-2,p.y-2,4,4);}
  ctx.globalAlpha=1;
  drawTrail(now);
  // coins flying to HUD
  const tx=CX,ty=26;
  for(const c of coinsFly){
    const x=c.x+(tx-c.x)*c.t*c.t,y=c.y+(ty-c.y)*c.t*c.t;
    ctx.shadowColor='#ffd23c';ctx.shadowBlur=10;ctx.fillStyle='#ffd23c';
    ctx.beginPath();ctx.arc(x,y,7,0,7);ctx.fill();ctx.shadowBlur=0;
  }
  for(const p of pops){ctx.globalAlpha=Math.max(0,p.life);
    ctx.font='bold 24px system-ui';ctx.textAlign='center';
    ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=12;
    ctx.fillText(p.txt,p.x,p.y);ctx.shadowBlur=0;ctx.globalAlpha=1;}
  ctx.restore();
  if(flash>0){ctx.fillStyle=`rgba(255,40,80,${flash*0.3})`;ctx.fillRect(0,0,W,H);}

  distEl.textContent=Math.round(dist)+'m';
  coinsEl.textContent='🪙 '+coinsRun;
  comboEl.textContent=combo>1?'COMBO ×'+combo:'';
  heartsEl.textContent='❤️'.repeat(Math.max(0,hearts))+'🖤'.repeat(Math.max(0,3+save.up.heart-hearts));
}
requestAnimationFrame(frame);
</script>
</body>
</html>
