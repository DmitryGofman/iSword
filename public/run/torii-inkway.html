<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<link rel="icon" href="../favicon.svg">
<title>iSword RUN — Torii Inkway</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#efe9dc;touch-action:none;
    font-family:Georgia,'Times New Roman',serif;-webkit-user-select:none;user-select:none}
  canvas{display:block;width:100vw;height:100vh}
  #hud{position:fixed;top:0;left:0;right:0;padding:12px 18px;display:flex;
    justify-content:space-between;pointer-events:none;color:#2b2620}
  .big{font-size:30px;font-weight:700}
  #seals{color:#a3271e;font-size:17px;font-weight:700}
  #hearts{font-size:16px;letter-spacing:2px}
  #inkWrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);width:min(300px,46vw);height:8px;
    border:1px solid #2b2620;border-radius:5px;overflow:hidden;pointer-events:none;background:rgba(43,38,32,.08)}
  #ink{height:100%;background:#2b2620;width:100%}
  #hint{position:fixed;bottom:12px;left:0;right:0;text-align:center;color:#8a8172;font-size:12.5px;
    pointer-events:none;font-style:italic}
  b{color:#a3271e;font-style:normal}
  #over{position:fixed;inset:0;display:none;place-items:center;background:rgba(239,233,220,.93);color:#2b2620;text-align:center}
  #over h1{margin:0 0 4px;font-size:30px;letter-spacing:.12em}
  #over .stats{color:#5a5344;font-size:15px;line-height:1.7;margin-bottom:14px}
  .shop{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
  .shop button{background:#efe9dc;color:#2b2620;border:1.5px solid #2b2620;border-radius:4px;
    padding:10px 14px;font-size:13.5px;cursor:pointer;font-family:inherit}
  .shop button:disabled{opacity:.4}
  #again{background:#a3271e;color:#efe9dc;border:0;border-radius:4px;padding:13px 34px;
    font-size:17px;font-weight:700;cursor:pointer;letter-spacing:.15em;font-family:inherit}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div><div class="big" id="dist">0 里</div><div id="hearts"></div></div>
  <div style="text-align:right"><div id="seals">印 0</div>
    <div style="color:#8a8172;font-size:12.5px">RUN B · <b>TORII INKWAY</b></div></div>
</div>
<div id="inkWrap"><div id="ink"></div></div>
<div id="hint">Your brush is blade <b>and</b> bridge — stroke <b>through demons</b> to cut them,
stroke <b>across the sky</b> and the fox runs on the ink. Reach the high seals. Mind the thorns.</div>
<div id="over"><div>
  <h1>旅 の 終 わ り</h1>
  <div class="stats" id="stats"></div>
  <div class="shop" id="shop"></div>
  <button id="again">RUN AGAIN</button>
</div></div>
<script>
'use strict';
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W=0,H=0,GROUND=0,DPR=Math.min(2,window.devicePixelRatio||1);
function resize(){W=innerWidth;H=innerHeight;GROUND=H*0.8;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();

// paper texture
const paper=document.createElement('canvas');
(function(){paper.width=256;paper.height=256;const p=paper.getContext('2d');
p.fillStyle='#efe9dc';p.fillRect(0,0,256,256);
const img=p.getImageData(0,0,256,256);
for(let i=0;i<img.data.length;i+=4){const n=(Math.random()-0.5)*13;
  img.data[i]+=n;img.data[i+1]+=n;img.data[i+2]+=n*0.8;}
p.putImageData(img,0,0);})();

let AC=null;
function audio(){if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(f,dur,vol,type){try{
  const ac=audio(),o=ac.createOscillator(),g=ac.createGain();
  o.type=type||'sine';o.frequency.value=f;
  g.gain.setValueAtTime(vol||0.12,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+dur);
}catch(e){}}

// ---------- save ----------
const SAVE_KEY='iswordRunInk';
let save={wallet:0,up:{pot:0,feather:0,magnet:0}};
try{const s=JSON.parse(localStorage.getItem(SAVE_KEY));if(s&&s.up)save=s;}catch(e){}
function persist(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(save));}catch(e){}}
const SHOP=[
  {id:'pot',   name:'🖌️ Deeper Ink Pot',desc:'+35% ink',        cost:l=>120*(l+1),max:3},
  {id:'feather',name:'🍃 Feather Fall', desc:'fall slower',      cost:l=>150*(l+1),max:2},
  {id:'magnet',name:'🧲 Seal Magnet',   desc:'seals drift to you',cost:l=>180*(l+1),max:3},
];

// ---------- state ----------
let demons,seals,thorns,toriis,bridges,parts,pops,trail;
let dist,speed,fox,ink,inkMax,hearts,sealsRun,kills,spawnT,thornT,toriiT,invuln,dead,shake;
function reset(){
  demons=[];seals=[];thorns=[];toriis=[];bridges=[];parts=[];pops=[];trail=[];
  dist=0;speed=210;sealsRun=0;kills=0;hearts=3;invuln=0;dead=false;shake=0;
  inkMax=100*(1+save.up.pot*0.35);ink=inkMax;
  fox={x:W*0.24,y:GROUND,vy:0,on:'ground'};
  spawnT=1.4;thornT=3;toriiT=0.5;
  overEl.style.display='none';
}
const distEl=document.getElementById('dist'),sealsEl=document.getElementById('seals'),
      heartsEl=document.getElementById('hearts'),inkEl=document.getElementById('ink'),
      overEl=document.getElementById('over'),statsEl=document.getElementById('stats'),
      shopEl=document.getElementById('shop');

// ---------- input: the brush ----------
let down=false;
function pt(e){return{x:e.clientX,y:e.clientY,t:performance.now()};}
addEventListener('pointerdown',e=>{audio();if(dead)return;
  down=true;trail.length=0;trail.push(pt(e));});
addEventListener('pointerup',()=>{
  down=false;
  if(dead)return;
  if(trail.length>3){ // released stroke becomes an ink bridge (world space)
    bridges.push({pts:trail.map(p=>({x:p.x+dist*0,wx:p.x+scrollX(),y:p.y})),life:3.6});
    tone(180,0.12,0.06);
  }
  trail.length=0;
});
function scrollX(){return dist;} // world x of screen-left + fox offset handled via wx-dist
addEventListener('pointermove',e=>{
  if(!down||dead)return;
  const p=pt(e),q=trail[trail.length-1];
  if(q){const seg=Math.hypot(p.x-q.x,p.y-q.y);
    if(ink<=0){return;}                        // pot empty: brush lifts
    ink=Math.max(0,ink-seg*0.05);
  }
  trail.push(p);
  if(!q)return;
  const dt=Math.max(1,p.t-q.t);
  if(Math.hypot(p.x-q.x,p.y-q.y)/dt*1000<300)return;
  for(let i=demons.length-1;i>=0;i--){
    const d=demons[i],sx=d.wx-dist;
    if(segCircle(q.x,q.y,p.x,p.y,sx,d.y,d.r+8)){demons.splice(i,1);cutDemon(d,sx);}
  }
});
function segCircle(x1,y1,x2,y2,cx,cy,r){
  const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;
  let t=l2?((cx-x1)*dx+(cy-y1)*dy)/l2:0;t=Math.max(0,Math.min(1,t));
  const px=x1+t*dx,py=y1+t*dy;
  return (px-cx)*(px-cx)+(py-cy)*(py-cy)<=r*r;
}
function cutDemon(d,sx){
  kills++;sealsRun+=2;ink=Math.min(inkMax,ink+14);shake=6;
  tone(660,0.2,0.14);tone(990,0.3,0.06);
  pops.push({x:sx,y:d.y-d.r-10,txt:'斬 +2印',col:'#a3271e',life:1.2});
  for(let i=0;i<14;i++){const a=Math.random()*7,v=100+Math.random()*300;
    parts.push({x:sx,y:d.y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,col:'#1d1913',life:0.4+Math.random()*0.4});}
}
function loseHeart(why){
  if(invuln>0||dead)return;
  hearts--;invuln=1.4;shake=16;tone(110,0.4,0.2,'sawtooth');
  pops.push({x:fox.x,y:fox.y-60,txt:why,col:'#a3271e',life:1.2});
  if(hearts<=0)die();
}
function die(){
  dead=true;save.wallet+=sealsRun;persist();
  statsEl.innerHTML=`distance <b>${Math.round(dist/10)} 里</b> · demons cut <b>${kills}</b><br>`+
    `seals this run <b style="color:#a3271e">印 ${sealsRun}</b> · pouch <b style="color:#a3271e">印 ${save.wallet}</b>`;
  renderShop();overEl.style.display='grid';
}
function renderShop(){
  shopEl.innerHTML='';
  for(const it of SHOP){
    const lv=save.up[it.id],b=document.createElement('button');
    if(lv>=it.max){b.textContent=`${it.name} MAX`;b.disabled=true;}
    else{const c=it.cost(lv);
      b.innerHTML=`${it.name} lv${lv} → ${lv+1}<br><span style="color:#a3271e">印 ${c}</span> · <span style="color:#8a8172">${it.desc}</span>`;
      b.disabled=save.wallet<c;
      b.onclick=()=>{save.wallet-=c;save.up[it.id]++;persist();die();};}
    shopEl.appendChild(b);
  }
}
document.getElementById('again').onclick=()=>reset();

// ---------- spawning (world coordinates: wx, scrolls with dist) ----------
function spawnStuff(){
  const r=Math.random();
  if(r<0.55){ // demon at low/mid/high band
    const band=Math.random();
    const y=band<0.45?GROUND-30:band<0.8?GROUND-140-Math.random()*80:GROUND-300-Math.random()*90;
    demons.push({wx:dist+W+80,y,r:24+Math.random()*10,wob:Math.random()*7});
  }else{ // arc of seals, mostly high (bridges reach them)
    const y0=GROUND-180-Math.random()*220,x0=dist+W+80;
    for(let i=0;i<4;i++)seals.push({wx:x0+i*46,y:y0+Math.sin(i*0.9)*24,r:12});
  }
}

// ---------- render ----------
function bg(t){
  ctx.fillStyle=ctx.createPattern(paper,'repeat');ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=0.12;ctx.fillStyle='#a3271e';
  ctx.beginPath();ctx.arc(W*0.8,H*0.18,Math.min(W,H)*0.1,0,7);ctx.fill();ctx.globalAlpha=1;
  // parallax ink mountain bands
  for(let l=0;l<3;l++){
    const par=0.12+l*0.16,al=0.10+l*0.09,base=GROUND-150+l*46;
    ctx.fillStyle=`rgba(43,38,32,${al})`;
    ctx.beginPath();ctx.moveTo(0,H);
    for(let x=0;x<=W;x+=24){
      const wx=(x+dist*par)*0.004+l*37;
      ctx.lineTo(x,base-Math.abs(Math.sin(wx)*90+Math.sin(wx*2.7)*34));
    }
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  }
  // ground line (brush)
  ctx.strokeStyle='#1d1913';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(0,GROUND+14);
  for(let x=0;x<=W;x+=30)ctx.lineTo(x,GROUND+14+Math.sin((x+dist)*0.02)*2);
  ctx.stroke();
}
function drawTorii(sx,s){
  ctx.save();ctx.translate(sx,GROUND+14);ctx.scale(s,s);
  ctx.strokeStyle='#a3271e';ctx.lineWidth=10;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-46,0);ctx.lineTo(-40,-150);ctx.moveTo(46,0);ctx.lineTo(40,-150);ctx.stroke();
  ctx.lineWidth=12;ctx.beginPath();ctx.moveTo(-64,-146);ctx.quadraticCurveTo(0,-166,64,-146);ctx.stroke();
  ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(-50,-118);ctx.lineTo(50,-118);ctx.stroke();
  ctx.restore();
}
function drawFox(t){
  if(invuln>0&&Math.floor(t*0.01)%2)return;   // blink while invulnerable
  ctx.save();ctx.translate(fox.x,fox.y);
  const lope=fox.on?Math.sin(t*0.02)*3:0;
  ctx.translate(0,lope);
  ctx.fillStyle='#1d1913';
  ctx.beginPath();ctx.ellipse(0,-16,24,14,-0.1,0,7);ctx.fill();          // body
  ctx.beginPath();ctx.ellipse(18,-26,10,8,-0.2,0,7);ctx.fill();          // head
  ctx.beginPath();ctx.moveTo(22,-33);ctx.lineTo(27,-42);ctx.lineTo(30,-32);ctx.closePath();ctx.fill(); // ear
  ctx.strokeStyle='#1d1913';ctx.lineWidth=5;ctx.lineCap='round';         // tail sweep
  ctx.beginPath();ctx.moveTo(-20,-18);ctx.quadraticCurveTo(-38,-30+Math.sin(t*0.015)*6,-30,-40);ctx.stroke();
  ctx.fillStyle='#a3271e';ctx.beginPath();ctx.arc(21,-27,2,0,7);ctx.fill(); // eye
  // legs implied
  ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(-8,-6);ctx.lineTo(-10+Math.sin(t*0.02)*6,2);
  ctx.moveTo(10,-6);ctx.lineTo(12-Math.sin(t*0.02)*6,2);ctx.stroke();
  ctx.restore();
}
function strokeWidthAt(i,n){const t=i/(n-1);return 12*Math.sin(Math.PI*Math.min(1,t*1.15))+1.5;}
function drawBrush(pts,alpha){
  if(pts.length<2)return;
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
  for(let i=1;i<pts.length;i++){
    ctx.globalAlpha=alpha*0.85;ctx.strokeStyle='#1d1913';
    ctx.lineWidth=strokeWidthAt(i,pts.length);
    ctx.beginPath();ctx.moveTo(pts[i-1].x,pts[i-1].y);ctx.lineTo(pts[i].x,pts[i].y);ctx.stroke();
    ctx.globalAlpha=alpha*0.22;ctx.lineWidth*=1.8;ctx.stroke();
  }
  ctx.restore();ctx.globalAlpha=1;
}

reset();
let last=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  const dt=Math.min(0.035,(now-last)/1000);last=now;
  const gdt=dead?0:dt;

  speed=Math.min(430,speed+gdt*3.4);
  dist+=speed*gdt;
  ink=Math.min(inkMax,ink+gdt*7);
  invuln=Math.max(0,invuln-dt);
  spawnT-=gdt;if(spawnT<=0){spawnStuff();spawnT=(0.9+Math.random()*0.9)*(260/speed);}
  thornT-=gdt;if(thornT<=0){thorns.push({wx:dist+W+60,w:90+Math.random()*120});thornT=2.6+Math.random()*2.4;}
  toriiT-=gdt;if(toriiT<=0){toriis.push({wx:dist+W+120});toriiT=4+Math.random()*3;}

  // fox vertical physics: stand on bridge ink if one is underfoot, else ground
  let supportY=GROUND;
  for(const b of bridges){
    for(let i=1;i<b.pts.length;i++){
      const a=b.pts[i-1],c=b.pts[i];
      const ax=a.wx-dist,cx2=c.wx-dist;
      if((ax-fox.x)*(cx2-fox.x)<=0&&Math.abs(cx2-ax)>0.01){
        const t=(fox.x-ax)/(cx2-ax),y=a.y+(c.y-a.y)*t;
        if(y<supportY&&y>=fox.y-14)supportY=y;   // only surfaces at/below the fox's feet
      }
    }
  }
  const g=1700*(1-save.up.feather*0.3);
  fox.vy+=g*gdt;fox.y+=fox.vy*gdt;
  if(fox.y>=supportY){fox.y=supportY;fox.vy=0;fox.on=supportY<GROUND?'ink':'ground';}
  else fox.on=null;

  // demons drift left & wobble; collide with fox
  for(let i=demons.length-1;i>=0;i--){
    const d=demons[i],sx=d.wx-dist;
    d.y+=Math.sin(now*0.003+d.wob)*20*gdt;
    if(sx<-60){demons.splice(i,1);continue;}
    if(!dead&&Math.abs(sx-fox.x)<d.r+18&&Math.abs(d.y-(fox.y-18))<d.r+18){
      demons.splice(i,1);loseHeart('鬼 !');}
  }
  // seals: magnet + collect
  const magR=40+save.up.magnet*45;
  for(let i=seals.length-1;i>=0;i--){
    const s=seals[i],sx=s.wx-dist;
    if(sx<-40){seals.splice(i,1);continue;}
    const dx=fox.x-sx,dy=(fox.y-20)-s.y,dd=Math.hypot(dx,dy);
    if(dd<magR){s.wx+=dx*4*gdt;s.y+=dy*4*gdt;}
    if(dd<26){seals.splice(i,1);sealsRun++;tone(1100,0.12,0.1);
      pops.push({x:sx,y:s.y,txt:'+1印',col:'#a3271e',life:0.8});}
  }
  // thorns hurt when fox is on the ground inside a patch
  for(let i=thorns.length-1;i>=0;i--){
    const th=thorns[i],sx=th.wx-dist;
    if(sx+th.w<-20){thorns.splice(i,1);continue;}
    if(!dead&&fox.on==='ground'&&fox.x>sx&&fox.x<sx+th.w)loseHeart('棘 !');
  }
  for(let i=toriis.length-1;i>=0;i--)if(toriis[i].wx-dist<-160)toriis.splice(i,1);
  for(let i=bridges.length-1;i>=0;i--){bridges[i].life-=dt;if(bridges[i].life<=0)bridges.splice(i,1);}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=600*dt;p.life-=dt;if(p.life<=0)parts.splice(i,1);}
  for(let i=pops.length-1;i>=0;i--){const p=pops[i];p.y-=40*dt;p.life-=dt;if(p.life<=0)pops.splice(i,1);}
  shake=Math.max(0,shake-60*dt);

  // ---------- draw ----------
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  bg(now);
  for(const t of toriis)drawTorii(t.wx-dist,1);
  // thorn patches
  for(const th of thorns){const sx=th.wx-dist;
    ctx.strokeStyle='#1d1913';ctx.lineWidth=2.5;ctx.beginPath();
    for(let x=0;x<th.w;x+=12){ctx.moveTo(sx+x,GROUND+14);ctx.lineTo(sx+x+5,GROUND-6);}
    ctx.stroke();}
  // ink bridges
  for(const b of bridges)
    drawBrush(b.pts.map(p=>({x:p.wx-dist,y:p.y})),Math.min(1,b.life));
  // seals
  for(const s of seals){const sx=s.wx-dist;
    ctx.save();ctx.translate(sx,s.y);ctx.rotate(-0.08);
    ctx.fillStyle='#a3271e';ctx.fillRect(-s.r,-s.r,s.r*2,s.r*2);
    ctx.fillStyle='#efe9dc';ctx.font=`bold ${s.r*1.3}px Georgia,serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('印',0,1);
    ctx.restore();}
  // demons: ink-wash blobs with horns
  for(const d of demons){const sx=d.wx-dist;
    ctx.save();ctx.translate(sx,d.y);
    const sq=1+Math.sin(now*0.008+d.wob)*0.1;ctx.scale(sq,2-sq);
    for(let i=3;i>=0;i--){ctx.globalAlpha=0.18+i*0.18;ctx.fillStyle='#1d1913';
      ctx.beginPath();ctx.arc(0,0,d.r*(1-i*0.13),0,7);ctx.fill();}
    ctx.globalAlpha=1;
    ctx.strokeStyle='#1d1913';ctx.lineWidth=3;ctx.lineCap='round';   // horns
    ctx.beginPath();ctx.moveTo(-d.r*0.4,-d.r*0.7);ctx.lineTo(-d.r*0.6,-d.r*1.25);
    ctx.moveTo(d.r*0.4,-d.r*0.7);ctx.lineTo(d.r*0.6,-d.r*1.25);ctx.stroke();
    ctx.fillStyle='#a3271e';                                          // eyes
    ctx.beginPath();ctx.arc(-d.r*0.3,-d.r*0.12,2.6,0,7);ctx.arc(d.r*0.3,-d.r*0.12,2.6,0,7);ctx.fill();
    ctx.restore();}
  drawFox(now);
  ctx.shadowBlur=0;
  for(const p of parts){ctx.globalAlpha=Math.max(0,p.life*1.8);ctx.fillStyle=p.col;ctx.fillRect(p.x-2,p.y-2,4,4);}
  ctx.globalAlpha=1;
  // live brush stroke
  while(trail.length&&now-trail[0].t>2500)trail.shift();
  drawBrush(trail,1);
  for(const p of pops){ctx.globalAlpha=Math.max(0,p.life);
    ctx.font='600 20px Georgia,serif';ctx.textAlign='center';
    ctx.fillStyle=p.col;ctx.fillText(p.txt,p.x,p.y);}
  ctx.globalAlpha=1;
  ctx.restore();

  distEl.textContent=Math.round(dist/10)+' 里';
  sealsEl.textContent='印 '+sealsRun;
  heartsEl.textContent='❤️'.repeat(Math.max(0,hearts))+'🖤'.repeat(Math.max(0,3-hearts));
  inkEl.style.width=(ink/inkMax*100).toFixed(0)+'%';
}
requestAnimationFrame(frame);
</script>
</body>
</html>
